upstream tungaos_api {
    server api:4000;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name api.sprinterp.tech;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name api.sprinterp.tech;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/api.sprinterp.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sprinterp.tech/privkey.pem;

    client_max_body_size 50M;

    # API proxy
    location /api/ {
        proxy_pass http://tungaos_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # Tells API it's HTTPS
        proxy_set_header x-hotel-id $http_x_hotel_id;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket proxy
    location /socket.io/ {
        proxy_pass http://tungaos_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Swagger docs (disable in production via env)
    location /docs {
        proxy_pass http://tungaos_api;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
